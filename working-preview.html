<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/antd/5.14.0/antd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/5.14.0/reset.css">
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica Neue,Arial,sans-serif;font-size:14px;line-height:1.5;color:#333;background-color:#f0f2f5}
      #root{height:100vh}
    </style>
  </head>
  <body>
    <div id="root"></div>

          createTime: '2026-03-04 15:41:45',
          status: '进行中'

      ];

            key: 'activityName',
            width: 120,

          {
            title: '活动类型',
            dataIndex: 'activityType',
            key: 'activityType',
            width: 120,
          },
          {
            title: '时间口径',
            dataIndex: 'timeType',
            key: 'timeType',
            width: 80,

            dataIndex: 'activityTime',
            key: 'activityTime',
            width: 200,
          },
          {

            dataIndex: 'minOrderAmount',
            key: 'minOrderAmount',
            width: 100,
          },
          {
            title: '奖励佣金',
            dataIndex: 'reward',
            key: 'reward',
            width: 80,
          },
          {
            title: '小程序展示名称',
            dataIndex: 'miniAppName',
            key: 'miniAppName',
            width: 120,
          },
          {

            key: 'createTime',

        return React.createElement(
          Layout,
          null,
          React.createElement(

              { style: { display: 'flex', alignItems: 'center' } },
              React.createElement(
                Badge,

                React.createElement('span', { style: { fontSize: '18px', color: '#666' } }, '🔔')
              ),
              React.createElement(
                'div',
                { style: { display: 'flex', alignItems: 'center', cursor: 'pointer' } },
                React.createElement(Avatar, { size: 'small', style: { marginRight: '8px' } }, '苏'),

                      { key: '4-4', label: '地推拉新活动' },
                    ],
                  },
                ]
              })

            React.createElement(
              Content,

                            React.createElement(

                              { style: { marginBottom: '12px' } },
                              React.createElement(

                                { size: 'small' },
                                React.createElement(Button, { size: 'small', type: activeStatus === '进行中' ? 'primary' : 'default', onClick: () => setActiveStatus('进行中') }, '进行中'),
                                React.createElement(Button, { size: 'small', type: activeStatus === '待提交' ? 'primary' : 'default', onClick: () => setActiveStatus('待提交') }, '待提交'),
                                React.createElement(Button, { size: 'small', type: activeStatus === '审核中' ? 'primary' : 'default', onClick: () => setActiveStatus('审核中') }, '审核中'),

                              { style: { marginBottom: '12px' } },
                              React.createElement(
                                Space,
                                { size: 'small' },

                                React.createElement(Button, { size: 'small', type: 'primary' }, '新增活动'),

                              React.createElement('span', { style: { marginRight: '4px' } }, '创建时间：'),
                              React.createElement(DatePicker, { size: 'small', style: { marginRight: '12px' } }),
                              React.createElement('span', { style: { marginRight: '4px' } }, '活动时间：'),
                              React.createElement(DatePicker.RangePicker, { size: 'small', style: { marginRight: '12px' } })
                            )
                          ),
                          React.createElement(Table, {
                            columns: columns,
                            dataSource: activityData,
                            pagination: false,
                            bordered: true,
                            size: 'small'
                          }),
                          React.createElement(
                            'div',
                            { style: { marginTop: '12px', display: 'flex', justifyContent: 'center', alignItems: 'center', fontSize: '12px' } },
                            React.createElement('span', { style: { marginRight: '16px' } }, '共 1 条'),
                            React.createElement(
                              'div',
                              { style: { display: 'flex', alignItems: 'center' } },
                              React.createElement('button', { style: { marginRight: '8px', border: '1px solid #d9d9d9', background: '#fff', padding: '2px 8px', cursor: 'pointer' }, disabled: true }, '<'),
                              React.createElement('button', { style: { marginRight: '8px', border: '1px solid #1890ff', background: '#1890ff', color: '#fff', padding: '2px 8px', cursor: 'pointer' } }, '1'),
                              React.createElement('button', { style: { marginRight: '8px', border: '1px solid #d9d9d9', background: '#fff', padding: '2px 8px', cursor: 'pointer' }, disabled: true }, '>')
                            )
                          ),
                          React.createElement(
                            'div',
                            { style: { marginTop: '24px', textAlign: 'center', color: '#666', fontSize: '12px' } },
                            'Copyright©万家科技有限公司'
                          )
                        )
                      }
                    ]
                  })
                )
              )
            )
          )
        );
      }

      function App() {
        return React.createElement(ActivityList);
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(React.createElement(App));
    </script>
  </body>
</html>
