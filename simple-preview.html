<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全员带货后台管理系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/antd/5.14.0/antd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/5.14.0/reset.css">
    <style>
      *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica Neue,Arial,sans-serif;font-size:14px;line-height:1.5;color:#333;background-color:#f0f2f5}#root{height:100vh}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const { Layout, Menu, Breadcrumb, Tabs, Button, Input, DatePicker, Table, Tag, Space, Badge, Dropdown, Avatar } = antd;
      const { Header, Sider, Content } = Layout;
      
      const activityData = [
        {
          key: '1',
          activityId: '601',
          activityName: '首单活动3m',
          activityType: '根据新会员首单奖励',
          timeType: '下单时间',
          activityTime: '2026-03-04 15:14:44 → 2026-05-31 15:41...',
          minOrderAmount: '¥99',
          reward: '¥1.58',
          miniAppName: '首单奖励活动',
          createTime: '2026-03-04 15:41:45',
          status: '进行中'
        }
      ];

      function ActivityList() {
        const [collapsed, setCollapsed] = useState(false);
        const [activeTab, setActiveTab] = useState('3');
        const [activeStatus, setActiveStatus] = useState('进行中');

        const columns = [
          {
            title: <input type="checkbox" />,
            dataIndex: 'checkbox',
            key: 'checkbox',
            width: 40,
            render: () => <input type="checkbox" />
          },
          {
            title: '活动名称',
            dataIndex: 'activityName',
            key: 'activityName',
            width: 120,
          },
          {
            title: '活动类型',
            dataIndex: 'activityType',
            key: 'activityType',
            width: 120,
          },
          {
            title: '时间口径',
            dataIndex: 'timeType',
            key: 'timeType',
            width: 80,
          },
          {
            title: '活动时间',
            dataIndex: 'activityTime',
            key: 'activityTime',
            width: 200,
          },
          {
            title: '有效订单金额',
            dataIndex: 'minOrderAmount',
            key: 'minOrderAmount',
            width: 100,
          },
          {
            title: '奖励佣金',
            dataIndex: 'reward',
            key: 'reward',
            width: 80,
          },
          {
            title: '小程序展示名称',
            dataIndex: 'miniAppName',
            key: 'miniAppName',
            width: 120,
          },
          {
            title: '创建时间',
            dataIndex: 'createTime',
            key: 'createTime',
            width: 150,
          },
          {
            title: '操作',
            key: 'action',
            width: 200,
            render: () => (
              <Space size="small">
                <a>编辑</a>
                <a>终止佣金规则</a>
                <a>规则说明</a>
                <a>配置导出</a>
              </Space>
            )
          }
        ];

        return (
          <Layout>
            <Header style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 24px', backgroundColor: '#fff', boxShadow: '0 2px 8px rgba(0,0,0,0.1)' }}>
              <div style={{ display: 'flex', alignItems: 'center' }}>
                <span style={{ fontSize: '18px', fontWeight: 'bold', marginRight: '24px' }}>全员带货后台管理系统-SIT</span>
                <Breadcrumb
                  items={[
                    { title: '活动' },
                    { title: '首单活动' },
                  ]}
                />
              </div>
              <div style={{ display: 'flex', alignItems: 'center' }}>
                <Badge count={5} style={{ marginRight: '16px' }}>
                  <span style={{ fontSize: '18px', color: '#666' }}>🔔</span>
                </Badge>
                <div style={{ display: 'flex', alignItems: 'center', cursor: 'pointer' }}>
                  <Avatar size="small" style={{ marginRight: '8px' }}>苏</Avatar>
                  <span style={{ marginRight: '4px' }}>苏曼</span>
                  <span style={{ fontSize: '12px' }}>▼</span>
                </div>
              </div>
            </Header>
            <Layout>
              <Sider width={200} style={{ background: '#fff', borderRight: '1px solid #f0f0f0' }} collapsible collapsed={collapsed} onCollapse={setCollapsed}>
                <Menu
                  mode="inline"
                  selectedKeys={['4-2']}
                  style={{ height: '100%', borderRight: 0, background: '#fff' }}
                  theme="light"
                  openKeys={['4']}
                  items={[
                    {
                      key: '1',
                      icon: <span>🏪</span>,
                      label: '商品',
                      children: [{ key: '1-1', label: '商品列表' }],
                    },
                    {
                      key: '4',
                      icon: <span>📅</span>,
                      label: '活动',
                      children: [
                        { key: '4-1', label: '拉新活动' },
                        { key: '4-2', label: '首单活动' },
                        { key: '4-3', label: '万家商城活动' },
                        { key: '4-4', label: '地推拉新活动' },
                      ],
                    },
                  ]}
                />
              </Sider>
              <Content style={{ padding: '24px', background: '#f0f2f5', minHeight: 280 }}>
                <div style={{ background: '#fff', padding: '24px', borderRadius: '8px', boxShadow: '0 2px 8px rgba(0,0,0,0.09)' }}>
                  <Tabs
                    activeKey={activeTab}
                    onChange={setActiveTab}
                    items={[
                      {
                        key: '3',
                        label: '首单活动',
                        children: (
                          <>
                            <div style={{ marginBottom: '12px' }}>
                              <h3 style={{ marginBottom: '4px', fontSize: '14px', fontWeight: 'bold' }}>首单奖励活动</h3>
                              <p style={{ color: '#666', marginBottom: '12px', fontSize: '12px' }}>若万家超市下单用户为新用户，则给与对应引导新用户下单的促销员首单奖励</p>
                              
                              <div style={{ marginBottom: '12px' }}>
                                <Space size="small">
                                  <Button size="small" type={activeStatus === '进行中' ? 'primary' : 'default'} onClick={() => setActiveStatus('进行中')}>进行中</Button>
                                  <Button size="small" type={activeStatus === '待提交' ? 'primary' : 'default'} onClick={() => setActiveStatus('待提交')}>待提交</Button>
                                  <Button size="small" type={activeStatus === '审核中' ? 'primary' : 'default'} onClick={() => setActiveStatus('审核中')}>审核中</Button>
                                  <Button size="small" type={activeStatus === '未开始' ? 'primary' : 'default'} onClick={() => setActiveStatus('未开始')}>未开始</Button>
                                </Space>
                              </div>
                              
                              <div style={{ marginBottom: '12px' }}>
                                <Space size="small">
                                  <Button size="small" type="primary">查询</Button>
                                  <Button size="small">重置</Button>
                                  <Button size="small" type="primary">新增活动</Button>
                                  <Button size="small" danger>终止</Button>
                                </Space>
                              </div>
                              
                              <div style={{ marginBottom: '12px', display: 'flex', alignItems: 'center', flexWrap: 'wrap', fontSize: '12px' }}>
                                <span style={{ marginRight: '4px' }}>活动ID：</span>
                                <Input size="small" placeholder="请输入活动ID" style={{ width: 150, marginRight: '12px' }} />
                                
                                <span style={{ marginRight: '4px' }}>活动名称：</span>
                                <Input size="small" placeholder="请输入活动名称" style={{ width: 150, marginRight: '12px' }} />
                                
                                <span style={{ marginRight: '4px' }}>创建时间：</span>
                                <DatePicker size="small" style={{ marginRight: '12px' }} />
                                
                                <span style={{ marginRight: '4px' }}>活动时间：</span>
                                <DatePicker.RangePicker size="small" style={{ marginRight: '12px' }} />
                              </div>
                            </div>
                            
                            <Table
                              columns={columns}
                              dataSource={activityData}
                              pagination={false}
                              bordered
                              size="small"
                            />
                            
                            <div style={{ marginTop: '12px', display: 'flex', justifyContent: 'center', alignItems: 'center', fontSize: '12px' }}>
                              <span style={{ marginRight: '16px' }}>共 1 条</span>
                              <div style={{ display: 'flex', alignItems: 'center' }}>
                                <button style={{ marginRight: '8px', border: '1px solid #d9d9d9', background: '#fff', padding: '2px 8px', cursor: 'pointer' }} disabled>&lt;</button>
                                <button style={{ marginRight: '8px', border: '1px solid #1890ff', background: '#1890ff', color: '#fff', padding: '2px 8px', cursor: 'pointer' }}>1</button>
                                <button style={{ marginRight: '8px', border: '1px solid #d9d9d9', background: '#fff', padding: '2px 8px', cursor: 'pointer' }} disabled>&gt;</button>
                              </div>
                            </div>
                            
                            <div style={{ marginTop: '24px', textAlign: 'center', color: '#666', fontSize: '12px' }}>
                              Copyright©万家科技有限公司
                            </div>
                          </>
                        )
                      }
                    ]}
                  />
                </div>
              </Content>
            </Layout>
          </Layout>
        );
      }

      function App() {
        return <ActivityList />;
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
